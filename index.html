<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>お釣り＆セット提案ツール</title>

<style>
body {
  font-family: sans-serif;
  padding:20px;
}

h1 {
  font-size:28px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
  margin-bottom:20px;
}

button {
  padding:15px;
  border-radius:10px;
  border:1px solid #ccc;
  background:#f5f5f5;
  cursor:pointer;
}

.section {
  margin-top:30px;
}

.total {
  font-size:32px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>キッチンカー向け｜お釣り計算＆セット提案ツール</h1>

<!-- 商品 -->
<div class="section">
<h2>商品を選択</h2>

<div class="grid">
<button onclick="addItem('ビーフ',230)">ビーフ 230円</button>
<button onclick="addItem('メンチ',380)">メンチ 380円</button>
<button onclick="addItem('牛すじ',300)">牛すじ 300円</button>

<button onclick="addItem('和風だし',180)">和風だし 180円</button>
<button onclick="addItem('明太クリーミー',300)">明太クリーミー 300円</button>
<button onclick="addItem('チーズ',300)">チーズ 300円</button>

<button onclick="addItem('かにクリーム',300)">かにクリーム 300円</button>
<button onclick="addItem('かぼちゃ',270)">かぼちゃ 270円</button>
<button onclick="addItem('常総牛',630)">常総牛 630円</button>
</div>
</div>

<!-- 注文内容 -->
<div class="section">
<h2>注文内容</h2>
<div id="order">なし</div>
</div>

<!-- セット提案 -->
<div class="section">
<h2>セット提案</h2>
<div id="suggest">（該当なし）</div>
</div>

<!-- 合計 -->
<div class="section">
<h2>合計</h2>
<div id="total" class="total">0円</div>
</div>

<button onclick="resetAll()">リセット</button>

<script>

let items = [];

function addItem(name, price){
  items.push({name, price});
  render();
}

function resetAll(){
  items = [];
  render();
}

function render(){

  // ------------------
  // 注文集計
  // ------------------
  let count = {};
  items.forEach(i=>{
    count[i.name] = (count[i.name]||0)+1;
  });

  // ------------------
  // 注文内容（絶対そのまま）
  // ------------------
  let orderHTML = "";

  for(let name in count){
    orderHTML += `${name} ×${count[name]}<br>`;
  }

  document.getElementById("order").innerHTML =
    orderHTML || "なし";


  // ------------------
  // セット提案（変換しない）
  // ------------------
  let suggestList = [];

  // お得セット
  if((count["ビーフ"]||0)>=3 && (count["メンチ"]||0)>=2){
    suggestList.push("お得セット（1400円）にできます");
  }

  // 4点セット
  if(
    (count["ビーフ"]||0)>=1 &&
    (count["メンチ"]||0)>=1 &&
    (count["牛すじ"]||0)>=1 &&
    (count["明太クリーミー"]||0)>=1
  ){
    suggestList.push("4点セット（1200円）にできます");
  }

  // 3点セット
  if(
    (count["ビーフ"]||0)>=1 &&
    (count["メンチ"]||0)>=1 &&
    (count["牛すじ"]||0)>=1
  ){
    suggestList.push("3点セット（900円）にできます");
  }

  // お土産セット
  if(
    (count["ビーフ"]||0)>=1 &&
    (count["和風だし"]||0)>=1 &&
    (count["常総牛"]||0)>=1
  ){
    suggestList.push("お土産セット（1000円）にできます");
  }

  document.getElementById("suggest").innerHTML =
    suggestList.length ? suggestList.join("<br>") : "（該当なし）";


  // ------------------
  // 合計（単品のまま）
  // ------------------
  let total = 0;
  items.forEach(i=>{
    total += i.price;
  });

  document.getElementById("total").innerText = total + "円";
}

</script>

</body>
</html>
