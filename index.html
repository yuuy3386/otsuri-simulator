<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>お釣り＆セット提案ツール</title>

<style>
body{
  font-family: sans-serif;
  padding:20px;
}

h1{
  font-size:28px;
}

.grid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
  margin-bottom:20px;
}

button{
  padding:15px;
  border-radius:10px;
  border:1px solid #ccc;
  background:#f5f5f5;
  cursor:pointer;
}

.section{
  margin-top:30px;
}

.result{
  margin-top:10px;
  line-height:1.8;
}

.total{
  font-size:28px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>キッチンカー向け｜お釣り計算＆セット提案ツール</h1>

<div class="section">
<h2>商品を選択</h2>

<div class="grid">
<button onclick="addItem('ビーフ',230)">ビーフ 230円</button>
<button onclick="addItem('メンチ',380)">メンチ 380円</button>
<button onclick="addItem('牛すじ',300)">牛すじ 300円</button>

<button onclick="addItem('和風だし',180)">和風だし 180円</button>
<button onclick="addItem('明太クリーミー',300)">明太クリーミー 300円</button>
<button onclick="addItem('チーズ',300)">チーズ 300円</button>

<button onclick="addItem('かにクリーム',300)">かにクリーム 300円</button>
<button onclick="addItem('かぼちゃ',270)">かぼちゃ 270円</button>
<button onclick="addItem('常総牛',630)">常総牛 630円</button>
</div>
</div>

<div class="section">
<h2>セットメニュー</h2>

<div class="grid">
<button onclick="addSet('3点セット',900)">3点セット 900円</button>
<button onclick="addSet('4点セット',1200)">4点セット 1200円</button>
<button onclick="addSet('お得セット',1400)">お得セット 1400円</button>
<button onclick="addSet('お土産セット',1000)">お土産セット 1000円</button>
</div>
</div>

<div class="section">
<h2>注文内容</h2>
<div id="order" class="result"></div>
</div>

<div class="section">
<h2>セット提案</h2>
<div id="suggest" class="result"></div>
</div>

<div class="section">
<h2>合計</h2>
<div id="total" class="total">0円</div>
</div>

<button onclick="resetAll()">リセット</button>

<script>
let items = [];
let manualSets = [];

function addItem(name,price){
  items.push({name,price});
  render();
}

function addSet(name,price){
  manualSets.push({name,price});
  render();
}

function resetAll(){
  items = [];
  manualSets = [];
  render();
}

function render(){

  let count = {};
  items.forEach(i=>{
    count[i.name] = (count[i.name]||0)+1;
  });

  let setList = [];
  let setTotal = 0;

  // ★3点セット
  while(
    count["ビーフ"]>=1 &&
    count["メンチ"]>=1 &&
    count["牛すじ"]>=1
  ){
    setList.push("3点セット（900円）");
    setTotal += 900;

    count["ビーフ"]--;
    count["メンチ"]--;
    count["牛すじ"]--;
  }

  // ★4点セット
  while(
    count["ビーフ"]>=1 &&
    count["メンチ"]>=1 &&
    count["牛すじ"]>=1 &&
    count["明太クリーミー"]>=1
  ){
    setList.push("4点セット（1200円）");
    setTotal += 1200;

    count["ビーフ"]--;
    count["メンチ"]--;
    count["牛すじ"]--;
    count["明太クリーミー"]--;
  }

  // ★お得セット
  while(
    count["ビーフ"]>=3 &&
    count["メンチ"]>=2
  ){
    setList.push("お得セット（1400円）");
    setTotal += 1400;

    count["ビーフ"]-=3;
    count["メンチ"]-=2;
  }

  // ★お土産セット
  while(
    count["ビーフ"]>=1 &&
    count["和風だし"]>=1 &&
    count["常総牛"]>=1
  ){
    setList.push("お土産セット（1000円）");
    setTotal += 1000;

    count["ビーフ"]--;
    count["和風だし"]--;
    count["常総牛"]--;
  }

  // 手動セット追加
  manualSets.forEach(s=>{
    setList.push(s.name);
    setTotal += s.price;
  });

  let singleTotal = 0;
  let html = "";

  html += "【セット】<br>";
  setList.forEach(s=>{
    html += s + "<br>";
  });

  html += "<br>【単品】<br>";

  for(let name in count){
    if(count[name]>0){
      let price = items.find(i=>i.name===name).price;
      singleTotal += price * count[name];
      html += `${name} ×${count[name]}<br>`;
    }
  }

  let total = setTotal + singleTotal;

  document.getElementById("order").innerHTML = html;

  document.getElementById("suggest").innerHTML =
    setList.length>0 ? "セット適用されています" : "（該当なし）";

  document.getElementById("total").innerText = total + "円";
}
</script>

</body>
</html>
