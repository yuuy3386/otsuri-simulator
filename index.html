<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>キッチンカー向け｜セット提案＆合計計算ツール</title>
  <style>
    html, body {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: sans-serif;
      margin: 0;
      background: #f3f3f3;
      color: #222;
      overflow: hidden;
    }

    .app {
      height: 100dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 24px;
    }

    h2 {
      font-size: 22px;
      margin: 28px 0 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .set-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    button {
      padding: 16px 12px;
      border-radius: 12px;
      border: 1px solid #cfcfcf;
      background: #f8f8f8;
      cursor: pointer;
      font-size: 16px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-2line {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1.2;
      gap: 4px;
      color: #007aff;
    }

    .btn-2line .price {
      font-size: 14px;
      color: #007aff;
      font-weight: 600;
    }

    .section {
      margin-top: 28px;
    }

    .box {
      line-height: 1.9;
      font-size: 18px;
      white-space: normal;
    }

    .total {
      font-size: 30px;
      font-weight: bold;
      margin-top: 8px;
    }

    .reset-wrap {
      margin-top: 18px;
    }

    .subtle {
      color: #666;
    }

    .order-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .mini-btn {
      padding: 6px 10px;
      font-size: 14px;
      border-radius: 8px;
    }

    .set-row {
      margin-bottom: 8px;
    }

    .set-chip {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      border: 1px solid transparent;
      margin-right: 8px;
    }

    .set-otoku {
      background: #ffe9ea;
      color: #b42332;
      border-color: #f7bcc1;
    }

    .set-4ten {
      background: #e8f3ff;
      color: #165ea8;
      border-color: #b9d8f7;
    }

    .set-omiyage {
      background: #e9f9ef;
      color: #1f7a44;
      border-color: #bdeacb;
    }

    .set-3ten {
      background: #fff4e6;
      color: #9a5a10;
      border-color: #f6d6ad;
    }

    @media (max-width: 640px) {
      .app {
        padding: 8px;
        height: 100dvh;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto minmax(0, 1.1fr) minmax(0, 1fr) auto auto;
        gap: 8px;
        overflow: hidden;
      }

      h1 {
        grid-column: 1 / -1;
        font-size: 16px;
        margin: 0;
      }

      h2 {
        font-size: 14px;
        margin: 0 0 4px;
      }

      .section {
        margin-top: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .section:nth-of-type(1) { grid-column: 1; grid-row: 2; }
      .section:nth-of-type(2) { grid-column: 2; grid-row: 2; }
      .section:nth-of-type(3) { grid-column: 1; grid-row: 3; }
      .section:nth-of-type(4) { grid-column: 2; grid-row: 3; }
      .section:nth-of-type(5) { grid-column: 1 / -1; grid-row: 4; }

      .section:nth-of-type(1),
      .section:nth-of-type(2) {
        overflow-y: auto;
      }

      .section:nth-of-type(4) {
        overflow-y: auto;
      }

      .grid {
        gap: 6px;
        margin-bottom: 0;
      }

      .grid button {
        min-height: 64px;
      }

      .set-grid {
        gap: 6px;
        margin-bottom: 0;
      }

      button {
        padding: 8px 6px;
        font-size: 12px;
        border-radius: 8px;
      }

      .btn-2line {
        gap: 2px;
      }

      .btn-2line .price {
        font-size: 11px;
      }

      .grid button:not(.btn-2line) {
        font-size: 11px;
        line-height: 1.2;
      }

      .mini-btn {
        padding: 4px 6px;
        font-size: 11px;
      }

      .order-row {
        margin-bottom: 4px;
        gap: 6px;
      }

      .box {
        font-size: 12px;
        line-height: 1.45;
      }

      .section:nth-of-type(3) .box {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
      }

      .total {
        font-size: 20px;
        margin-top: 0;
      }

      .reset-wrap {
        grid-column: 1 / -1;
        grid-row: 5;
        margin-top: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
  <h1>キッチンカー向け｜セット提案＆合計計算ツール</h1>

  <div class="section">
    <h2>商品を選択</h2>
    <div class="grid">
      <button class="btn-2line" onclick="addItem('ビーフ', 230)"><span>ビーフ</span><span class="price">230円</span></button>
      <button class="btn-2line" onclick="addItem('メンチ', 380)"><span>メンチ</span><span class="price">380円</span></button>
      <button class="btn-2line" onclick="addItem('牛すじ', 300)"><span>牛すじ</span><span class="price">300円</span></button>

      <button class="btn-2line" onclick="addItem('和風だし', 180)"><span>和風だし</span><span class="price">180円</span></button>
      <button onclick="addItem('明太クリーミー', 300)">明太クリーミー 300円</button>
      <button class="btn-2line" onclick="addItem('チーズ', 300)"><span>チーズ</span><span class="price">300円</span></button>

      <button class="btn-2line" onclick="addItem('かにクリーム', 300)"><span>かにクリーム</span><span class="price">300円</span></button>
      <button class="btn-2line" onclick="addItem('かぼちゃ', 270)"><span>かぼちゃ</span><span class="price">270円</span></button>
      <button class="btn-2line" onclick="addItem('常総牛', 630)"><span>常総牛</span><span class="price">630円</span></button>
    </div>
  </div>

  <div class="section">
    <h2>セットを追加（固定）</h2>
    <div class="set-grid">
      <button onclick="addSet('お得セット')">お得セット 1400円</button>
      <button onclick="addSet('4点セット')">4点セット 1200円</button>
      <button class="btn-2line" onclick="addSet('お土産セット')"><span>お土産セット</span><span class="price">1000円</span></button>
      <button onclick="addSet('3点セット')">3点セット 900円</button>
    </div>
  </div>

  <div class="section">
    <h2>注文内容</h2>
    <div id="order" class="box subtle">なし</div>
  </div>

  <div class="section">
    <h2>セット提案</h2>
    <div id="suggest" class="box subtle">（該当なし）</div>
    <div id="singleItems" class="box subtle"></div>
  </div>

  <div class="section">
    <h2>合計</h2>
    <div id="total" class="total">0円</div>
  </div>

  <div class="reset-wrap">
    <button onclick="resetAll()">リセット</button>
  </div>

  <script>
    const APP_VERSION = "2026-04-22-6";

    // スマホの強いキャッシュ対策: バージョン更新時は1回だけ強制再読込する。
    (function ensureLatestBuild() {
      const key = "otsuri_app_version";
      const saved = localStorage.getItem(key);
      if (saved === APP_VERSION) return;
      localStorage.setItem(key, APP_VERSION);
      const url = new URL(window.location.href);
      url.searchParams.set("v", APP_VERSION);
      window.location.replace(url.toString());
    })();

    const PRICE_MAP = {
      "ビーフ": 230,
      "メンチ": 380,
      "牛すじ": 300,
      "和風だし": 180,
      "明太クリーミー": 300,
      "チーズ": 300,
      "かにクリーム": 300,
      "かぼちゃ": 270,
      "常総牛": 630
    };

    const SET_DEFS = [
      {
        name: "お得セット",
        price: 1400,
        className: "set-otoku",
        items: { "ビーフ": 3, "メンチ": 2 }
      },
      {
        name: "4点セット",
        price: 1200,
        className: "set-4ten",
        items: { "ビーフ": 1, "メンチ": 1, "牛すじ": 1, "明太クリーミー": 1 }
      },
      {
        name: "お土産セット",
        price: 1000,
        className: "set-omiyage",
        items: { "ビーフ": 1, "和風だし": 1, "常総牛": 1 }
      },
      {
        name: "3点セット",
        price: 900,
        className: "set-3ten",
        items: { "ビーフ": 1, "メンチ": 1, "牛すじ": 1 }
      }
    ];

    let items = [];
    let fixedSetCounts = {};

    function addItem(name, price) {
      items.push({ name, price });
      render();
    }

    function addSet(setName) {
      fixedSetCounts[setName] = (fixedSetCounts[setName] || 0) + 1;
      render();
    }

    function removeSet(setName) {
      const current = fixedSetCounts[setName] || 0;
      if (current <= 0) return;
      if (current === 1) {
        delete fixedSetCounts[setName];
      } else {
        fixedSetCounts[setName] = current - 1;
      }
      render();
    }

    function getSetDefByName(setName) {
      return SET_DEFS.find((setDef) => setDef.name === setName) || null;
    }

    function resetAll() {
      items = [];
      fixedSetCounts = {};
      render();
    }

    function removeItem(name) {
      const idx = items.findIndex((item) => item.name === name);
      if (idx === -1) return;
      items.splice(idx, 1);
      render();
    }

    function buildCountMap() {
      const count = {};
      for (const item of items) {
        count[item.name] = (count[item.name] || 0) + 1;
      }
      return count;
    }

    function canApplySet(countMap, setDef) {
      for (const [name, qty] of Object.entries(setDef.items)) {
        if ((countMap[name] || 0) < qty) {
          return false;
        }
      }
      return true;
    }

    function subtractSet(countMap, setDef) {
      for (const [name, qty] of Object.entries(setDef.items)) {
        countMap[name] -= qty;
      }
    }

    function countMapKey(countMap) {
      return Object.keys(PRICE_MAP)
        .map((name) => countMap[name] || 0)
        .join("|");
    }

    function solveBestSetPlan(countMap, memo) {
      const key = countMapKey(countMap);
      if (memo[key]) {
        return memo[key];
      }

      const baseResult = {
        setCount: 0,
        setTotalPrice: 0,
        setCounts: {},
        remainingSingles: { ...countMap }
      };
      let best = baseResult;

      for (const setDef of SET_DEFS) {
        if (!canApplySet(countMap, setDef)) continue;

        const nextCount = { ...countMap };
        subtractSet(nextCount, setDef);
        const child = solveBestSetPlan(nextCount, memo);

        const candidateSetCount = child.setCount + 1;
        const candidateSetTotalPrice = child.setTotalPrice + setDef.price;
        const shouldReplace =
          candidateSetCount > best.setCount ||
          (candidateSetCount === best.setCount && candidateSetTotalPrice > best.setTotalPrice);

        if (shouldReplace) {
          const nextSetCounts = { ...child.setCounts };
          nextSetCounts[setDef.name] = (nextSetCounts[setDef.name] || 0) + 1;
          best = {
            setCount: candidateSetCount,
            setTotalPrice: candidateSetTotalPrice,
            setCounts: nextSetCounts,
            remainingSingles: child.remainingSingles
          };
        }
      }

      memo[key] = best;
      return best;
    }

    function calcAutoSets(originalCount) {
      const plan = solveBestSetPlan({ ...originalCount }, {});

      let total = 0;
      total += plan.setTotalPrice;
      for (const [name, qty] of Object.entries(plan.remainingSingles)) {
        if (qty > 0) {
          total += PRICE_MAP[name] * qty;
        }
      }

      // 10円未満が出ない前提のため、表示値は10円単位で統一。
      total = Math.round(total / 10) * 10;

      return { appliedSetCounts: plan.setCounts, remainingSingles: plan.remainingSingles, total };
    }

    function calcSuggestionSetCounts(countMap) {
      const suggestionCounts = {};
      const working = { ...countMap };

      // 各セットは提案上「最大1回」だけ表示する。
      // 4点と3点の重複も避けるため、順序を固定して1回ずつ判定する。
      const ordered = ["お得セット", "お土産セット", "4点セット", "3点セット"];
      for (const setName of ordered) {
        const setDef = SET_DEFS.find((s) => s.name === setName);
        if (!setDef) continue;

        let possibleQty = Infinity;
        for (const [name, qty] of Object.entries(setDef.items)) {
          const has = working[name] || 0;
          possibleQty = Math.min(possibleQty, Math.floor(has / qty));
        }

        if (possibleQty > 0 && possibleQty !== Infinity) {
          suggestionCounts[setDef.name] = 1;
          for (const [name, qty] of Object.entries(setDef.items)) {
            working[name] = (working[name] || 0) - qty;
          }
        }
      }

      return suggestionCounts;
    }

    function calcSetRegularPrice(setDef) {
      let regular = 0;
      for (const [name, qty] of Object.entries(setDef.items)) {
        regular += (PRICE_MAP[name] || 0) * qty;
      }
      return regular;
    }

    function render() {
      const count = buildCountMap();

      let orderHTML = "";
      for (const setDef of SET_DEFS) {
        const qty = fixedSetCounts[setDef.name] || 0;
        if (qty > 0) {
          orderHTML += `<div class="order-row"><span>${setDef.name} ×${qty}</span><button class="mini-btn" onclick="removeSet('${setDef.name}')">-1 取り消し</button></div>`;
        }
      }
      for (const [name, qty] of Object.entries(count)) {
        orderHTML += `<div class="order-row"><span>${name} ×${qty}</span><button class="mini-btn" onclick="removeItem('${name}')">-1 取り消し</button></div>`;
      }
      document.getElementById("order").innerHTML = orderHTML || "なし";

      const { remainingSingles, total } = calcAutoSets(count);
      const suggestedSetCounts = calcSuggestionSetCounts(count);
      let fixedSetTotal = 0;
      const combinedGrouped = {};

      for (const setDef of SET_DEFS) {
        const qty = fixedSetCounts[setDef.name] || 0;
        if (qty > 0) {
          combinedGrouped[setDef.name] = qty;
          fixedSetTotal += setDef.price * qty;
        }
      }

      for (const [setName, qty] of Object.entries(suggestedSetCounts)) {
        combinedGrouped[setName] = (combinedGrouped[setName] || 0) + qty;
      }

      if (Object.keys(combinedGrouped).length === 0) {
        document.getElementById("suggest").innerHTML = "（該当なし）";
      } else {
        let suggestHTML = "";
        let totalSaving = 0;
        for (const setDef of SET_DEFS) {
          const qty = combinedGrouped[setDef.name] || 0;
          if (qty > 0) {
            const regularPrice = calcSetRegularPrice(setDef);
            const savingPerSet = Math.max(0, regularPrice - setDef.price);
            const savingTotal = savingPerSet * qty;
            totalSaving += savingTotal;

            suggestHTML += `<div class="set-row"><span class="set-chip ${setDef.className}">${setDef.name}</span><span>（${setDef.price}円）`;
            if (qty > 1) {
              suggestHTML += ` ×${qty}`;
            }
            if (savingTotal > 0) {
              suggestHTML += ` ・${savingTotal}円お得`;
            }
            suggestHTML += "</span></div>";
          }
        }
        if (totalSaving > 0) {
          suggestHTML += `<div class="subtle">セット合計で ${totalSaving}円お得</div>`;
        }
        document.getElementById("suggest").innerHTML = suggestHTML.trim();
      }

      let singleHTML = "";
      for (const [name, qty] of Object.entries(remainingSingles)) {
        if (qty > 0) {
          singleHTML += `${name} ×${qty}<br>`;
        }
      }
      if (singleHTML) {
        document.getElementById("singleItems").innerHTML = `単品（セット対象外）<br>${singleHTML}`;
      } else {
        document.getElementById("singleItems").innerHTML = "";
      }

      const grandTotal = fixedSetTotal + total;
      document.getElementById("total").textContent = `${grandTotal}円`;
    }

    // 保存後に自動リロードされるよう、index.htmlの更新時刻を監視する。
    (function enableAutoReloadOnSave() {
      let lastModified = null;
      setInterval(async () => {
        try {
          const res = await fetch(window.location.href, { method: "HEAD", cache: "no-store" });
          const current = res.headers.get("Last-Modified");
          if (!current) return;
          if (lastModified && current !== lastModified) {
            window.location.reload();
            return;
          }
          lastModified = current;
        } catch (e) {
          // 監視失敗時は何もしない
        }
      }, 1000);
    })();

    render();
  </script>
  </div>
</body>
</html>
