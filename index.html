<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>お釣り計算＆セット提案ツール</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

.container {
  max-width: 700px;
}

/* 商品3列 */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

button {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  cursor: pointer;
}

.section {
  margin-top: 30px;
}

.result {
  margin-top: 10px;
  line-height: 1.8;
}
</style>
</head>

<body>

<div class="container">

<h1>キッチンカー向け｜お釣り計算＆セット提案ツール</h1>
<p>商品を選択してください（複数選択可）</p>

<div class="section">
<h2>商品</h2>

<div class="grid">
<button onclick="addItem('ビーフ',230)">ビーフ 230円</button>
<button onclick="addItem('メンチ',380)">メンチ 380円</button>
<button onclick="addItem('牛すじ',300)">牛すじ 300円</button>
<button onclick="addItem('和風だし',180)">和風だし 180円</button>
<button onclick="addItem('明太クリーミー',300)">明太クリーミー 300円</button>
<button onclick="addItem('チーズ',300)">チーズ 300円</button>
<button onclick="addItem('かにクリーム',300)">かにクリーム 300円</button>
<button onclick="addItem('かぼちゃ',270)">かぼちゃ 270円</button>
<button onclick="addItem('常総牛',630)">常総牛 630円</button>
</div>
</div>

<div class="section">
<h2>セットメニュー</h2>
<p>3点セット 900円 / 4点セット 1200円 / お得セット 1400円</p>
</div>

<div class="section">
<h2>注文内容</h2>
<div id="order" class="result"></div>
</div>

<div class="section">
<h2>セット提案</h2>
<div id="set" class="result"></div>
</div>

<div class="section">
<h2>合計</h2>
<div id="total">0円</div>
</div>

<button onclick="reset()">リセット</button>

</div>

<script>
let items = [];

function addItem(name, price){
  items.push({name, price});
  update();
}

function update(){
  let total = 0;
  let count = items.length;

  items.forEach(i => total += i.price);

  // セット判定
  let setCount = Math.floor(count / 3);
  let singleCount = count % 3;

  let setText = "";
  let orderText = "";

  if(setCount > 0){
    setText = "3点セット × " + setCount;
    orderText += "🎁 セット<br>";
    orderText += "3点セット × " + setCount + "<br><br>";
  }

  if(singleCount > 0){
    orderText += "単品<br>";
    for(let i = count - singleCount; i < count; i++){
      orderText += items[i].name + "<br>";
    }
  }

  if(setCount === 0){
    setText = "単品購入";
  }

  document.getElementById("order").innerHTML = orderText;
  document.getElementById("set").innerText = setText;
  document.getElementById("total").innerText = total + "円";
}

function reset(){
  items = [];
  update();
}
</script>

</body>
</html>
