<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>お釣りシミュレーション</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

/* 商品3列 */
.products {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

button {
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ccc;
  background: #f5f5f5;
  cursor: pointer;
}

.section {
  margin-top: 30px;
}

.result {
  margin-top: 10px;
  line-height: 2;
}
</style>
</head>

<body>

<h1>商品を選択</h1>

<div class="products">
<button onclick="add('ビーフ',230)">ビーフ 230円</button>
<button onclick="add('メンチ',380)">メンチ 380円</button>
<button onclick="add('牛すじ',300)">牛すじ 300円</button>
<button onclick="add('和風だし',180)">和風だし 180円</button>
<button onclick="add('明太クリーミー',300)">明太クリーミー 300円</button>
<button onclick="add('チーズ',300)">チーズ 300円</button>
<button onclick="add('かにクリーム',300)">かにクリーム 300円</button>
<button onclick="add('かぼちゃ',270)">かぼちゃ 270円</button>
<button onclick="add('常総牛',630)">常総牛 630円</button>
</div>

<div class="section">
<h2>セットメニュー</h2>
<p>3点セット 900円 / 4点セット 1200円 / お得セット 1400円</p>
</div>

<div class="section">
<h2>注文内容</h2>
<div id="order" class="result"></div>
</div>

<div class="section">
<h2>セット提案</h2>
<div id="set"></div>
</div>

<div class="section">
<h2>合計</h2>
<div id="total">0円</div>
</div>

<button onclick="reset()">リセット</button>

<script>
let items = [];

function add(name, price){
  items.push({name, price});
  render();
}

function render(){
  let total = 0;

  items.forEach(i => total += i.price);

  // セット分解（3点セット優先）
  let setCount = Math.floor(items.length / 3);
  let singles = items.slice(setCount * 3);

  // 表示用
  let html = "";

  if(setCount > 0){
    html += "🎁 セット<br>";
    html += `3点セット × ${setCount}<br><br>`;
  }

  if(singles.length > 0){
    html += "単品<br>";
    singles.forEach(i=>{
      html += `${i.name} ×1<br>`;
    });
  }

  if(items.length === 0){
    html = "";
  }

  document.getElementById("order").innerHTML = html;
  document.getElementById("set").innerText = setCount > 0 ? "3点セットあり" : "単品のみ";
  document.getElementById("total").innerText = total + "円";
}

function reset(){
  items = [];
  render();
}
</script>

</body>
</html>
